version: '3.8'

services:
  # 1. The Warehouse (PostgreSQL)
  postgres:
    image: postgres:15
    container_name: de-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. The Orchestrator (Custom Airflow)
  airflow:
    build: .
    container_name: airflow-orchestrator
    command: standalone
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__OPENLINEAGE__DISABLED=True
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    dns:
      - 8.8.8.8  # Google's DNS (very reliable)
      - 1.1.1.1  # Cloudflare's DNS

  # 3. The Spark Master
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8181:8080" # Spark UI (Moved to 8181 to avoid conflict with Airflow)
      - "7077:7077" # Spark Cluster Port
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    deploy:
      resources:
        limits:
          memory: 512M

  # 4. The Spark Worker
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    deploy:
      resources:
        limits:
          memory: 1.5G